<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concept Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #191919;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .widget {
      width: 100%;
      max-width: 640px;
      background: #191919;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
    }

    .header-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.7rem;
      color: #a09a92;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      margin-bottom: 1.1rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.85rem;
    }

    .idea-input {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.82rem;
      color: #e8e4df;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .idea-input::placeholder {
      color: #5a5650;
    }

    .idea-input:focus {
      border-color: rgba(255, 255, 255, 0.14);
    }

    .tag-input {
      width: 90px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: #e8e4df;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 0.5rem 0.6rem;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .tag-input::placeholder {
      color: #5a5650;
    }

    .tag-input:focus {
      border-color: rgba(255, 255, 255, 0.14);
    }

    .add-btn {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.72rem;
      color: #a09a92;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 0.5rem 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      letter-spacing: 0.02em;
    }

    .add-btn:hover {
      color: #d0cbc5;
      border-color: rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.07);
    }

    .search-row {
      margin-bottom: 0.85rem;
    }

    .search-input {
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      color: #e8e4df;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 0.45rem 0.75rem;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .search-input::placeholder {
      color: #5a5650;
    }

    .search-input:focus {
      border-color: rgba(255, 255, 255, 0.14);
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.85rem;
      min-height: 0;
    }

    .filter-row:empty {
      margin-bottom: 0;
    }

    .filter-tag {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.15rem 0.45rem;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.05);
      color: #7a756e;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .filter-tag:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #a09a92;
    }

    .filter-tag.active {
      background: rgba(255, 255, 255, 0.09);
      color: #c0bbb4;
      border-color: rgba(255, 255, 255, 0.12);
    }

    .ideas-list {
      max-height: none;
    }

    .idea-card {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 6px;
      margin-bottom: 0.35rem;
      opacity: 0;
      transform: translateY(6px);
      animation: fadeSlideIn 0.22s ease forwards;
      overflow: hidden;
    }

    .idea-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.75rem;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .idea-header:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .idea-caret {
      flex-shrink: 0;
      width: 12px;
      height: 12px;
      color: #4a4640;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .idea-card.expanded .idea-caret {
      transform: rotate(90deg);
      color: #8a857e;
    }

    .idea-preview {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      color: #b0aba5;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .idea-header .tag-badge {
      flex-shrink: 0;
    }

    .idea-header .timestamp {
      flex-shrink: 0;
    }

    .idea-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }

    .idea-card.expanded .idea-body {
      max-height: 500px;
    }

    .idea-body-inner {
      padding: 0 0.75rem 0.65rem 2rem;
    }

    @keyframes fadeSlideIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .idea-text {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      color: #d0cbc5;
      line-height: 1.6;
    }

    .delete-btn {
      font-size: 0.7rem;
      color: #4a4640;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.1rem 0.2rem;
      line-height: 1;
      transition: color 0.15s ease;
    }

    .delete-btn:hover {
      color: #8a857e;
    }

    .idea-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }

    .tag-badge {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.05);
      color: #7a756e;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .tag-badge:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #a09a92;
    }

    .timestamp {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.6rem;
      color: #5a5650;
    }

    .empty-state {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      color: #4a4640;
      text-align: center;
      padding: 2rem 0 1.5rem;
      font-style: italic;
    }

    .count-label {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.6rem;
      color: #4a4640;
      margin-bottom: 0.6rem;
      letter-spacing: 0.03em;
    }

    /* Card action buttons row */
    .card-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .copy-btn {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.55rem;
      color: #5a5650;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: color 0.15s ease;
    }

    .copy-btn:hover {
      color: #8a857e;
    }

    .notion-btn {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-radius: 6px;
      padding: 0.18rem 0.45rem;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s ease;
      line-height: 1.4;
    }

    .notion-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .notion-btn-journal {
      background: rgba(126, 184, 208, 0.12);
      border: 1px solid rgba(126, 184, 208, 0.2);
      color: #7eb8d0;
    }

    .notion-btn-journal:hover:not(:disabled) {
      background: rgba(126, 184, 208, 0.2);
    }

    .notion-btn-library {
      background: rgba(110, 192, 122, 0.12);
      border: 1px solid rgba(110, 192, 122, 0.2);
      color: #6ec07a;
    }

    .notion-btn-library:hover:not(:disabled) {
      background: rgba(110, 192, 122, 0.2);
    }

    .card-feedback {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.55rem;
      margin-left: 0.15rem;
    }

    .card-feedback.success {
      color: #6ec07a;
    }

    .card-feedback.error {
      color: #d07e7e;
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="header-label">Concept Map</div>

    <div class="input-row">
      <input
        class="idea-input"
        id="ideaInput"
        type="text"
        placeholder="Capture an idea..."
        autocomplete="off"
      />
      <input
        class="tag-input"
        id="tagInput"
        type="text"
        placeholder="tag"
        autocomplete="off"
      />
      <button class="add-btn" id="addBtn">Add</button>
    </div>

    <div class="search-row">
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="Search ideas..."
        autocomplete="off"
      />
    </div>

    <div class="filter-row" id="filterRow"></div>

    <div class="count-label" id="countLabel"></div>

    <div class="ideas-list" id="ideasList"></div>
  </div>

  <script>
    const CORS_PROXY = 'https://cors-proxy.kyle-d7d.workers.dev';

    const STORAGE_KEY = 'concept_map_ideas';

    const DB_JOURNAL = '3226a121-2986-816e-a777-da5ab00e6126';
    const DB_LIBRARY = '3226a121-2986-817a-a9b7-d5ce8fe7d290';

    let ideas = [];
    let activeFilter = null;
    let searchQuery = '';

    function loadIdeas() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        ideas = stored ? JSON.parse(stored) : [];
      } catch (e) {
        ideas = [];
      }
    }

    function saveIdeas() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function addIdea(text, tag) {
      const trimmedText = text.trim();
      if (!trimmedText) return;
      const trimmedTag = tag.trim().toLowerCase().replace(/\s+/g, '-') || null;
      const idea = {
        id: generateId(),
        text: trimmedText,
        tag: trimmedTag,
        createdAt: Date.now()
      };
      ideas.unshift(idea);
      saveIdeas();
      render();
    }

    function deleteIdea(id) {
      ideas = ideas.filter(i => i.id !== id);
      saveIdeas();
      render();
    }

    function relativeTime(ts) {
      const now = Date.now();
      const diff = now - ts;
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);

      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days === 1) return 'yesterday';
      if (days < 7) return `${days}d ago`;
      if (days < 30) return `${Math.floor(days / 7)}w ago`;
      return `${Math.floor(days / 30)}mo ago`;
    }

    function getAllTags() {
      const tags = new Set();
      ideas.forEach(i => { if (i.tag) tags.add(i.tag); });
      return Array.from(tags).sort();
    }

    function getFilteredIdeas() {
      return ideas.filter(idea => {
        const matchesTag = !activeFilter || idea.tag === activeFilter;
        const matchesSearch = !searchQuery ||
          idea.text.toLowerCase().includes(searchQuery) ||
          (idea.tag && idea.tag.includes(searchQuery));
        return matchesTag && matchesSearch;
      });
    }

    function renderFilters() {
      const filterRow = document.getElementById('filterRow');
      const tags = getAllTags();
      filterRow.innerHTML = '';

      tags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'filter-tag' + (activeFilter === tag ? ' active' : '');
        btn.textContent = tag;
        btn.addEventListener('click', () => {
          activeFilter = activeFilter === tag ? null : tag;
          render();
        });
        filterRow.appendChild(btn);
      });
    }

    async function copyIdeaText(text, btn) {
      try {
        await navigator.clipboard.writeText(text);
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = original; }, 1500);
      } catch (e) {
        // Fallback for browsers without clipboard API
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = original; }, 1500);
      }
    }

    async function sendToNotion(idea, databaseId, btn, feedbackEl) {
      btn.disabled = true;
      feedbackEl.textContent = '';
      feedbackEl.className = 'card-feedback';

      const title = idea.text.length > 100 ? idea.text.slice(0, 100) : idea.text;

      const properties = {
        Area: { type: 'multi_select', values: ['Philosophy'] },
        Type: { type: 'select', value: 'Idea' }
      };
      if (idea.tag) {
        properties.Tags = { type: 'multi_select', values: [idea.tag] };
      }

      const body = {
        database: databaseId,
        title,
        content: idea.text,
        properties
      };

      try {
        const res = await fetch(`${CORS_PROXY}/?mode=notion`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          throw new Error(data.error || `HTTP ${res.status}`);
        }

        feedbackEl.innerHTML = `<a href="${data.url}" target="_blank" rel="noopener" style="color:#6ec07a;text-decoration:none;font-size:0.6rem;">Open in Notion →</a>`;

        setTimeout(() => {
          feedbackEl.textContent = '';
          feedbackEl.className = 'card-feedback';
        }, 8000);
      } catch (err) {
        feedbackEl.textContent = 'Error';
        feedbackEl.classList.add('error');
        setTimeout(() => {
          feedbackEl.textContent = '';
          feedbackEl.className = 'card-feedback';
        }, 2500);
      } finally {
        btn.disabled = false;
      }
    }

    function renderIdeas() {
      const list = document.getElementById('ideasList');
      const countLabel = document.getElementById('countLabel');
      const filtered = getFilteredIdeas();

      list.innerHTML = '';

      if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = ideas.length === 0
          ? 'No ideas yet — start capturing.'
          : 'No matches found.';
        list.appendChild(empty);
        countLabel.textContent = '';
        return;
      }

      const total = filtered.length;
      countLabel.textContent = `${total} idea${total !== 1 ? 's' : ''}${activeFilter ? ' in #' + activeFilter : ''}${searchQuery ? ' matching "' + searchQuery + '"' : ''}`;

      const caretSVG = '<svg class="idea-caret" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="4.5 3 7.5 6 4.5 9"/></svg>';

      filtered.forEach((idea, index) => {
        const card = document.createElement('div');
        card.className = 'idea-card';
        card.style.animationDelay = `${index * 30}ms`;

        // --- Collapsed header: caret + preview + tag + time ---
        const header = document.createElement('div');
        header.className = 'idea-header';
        header.innerHTML = caretSVG;

        const preview = document.createElement('span');
        preview.className = 'idea-preview';
        preview.textContent = idea.text;
        header.appendChild(preview);

        if (idea.tag) {
          const badge = document.createElement('span');
          badge.className = 'tag-badge';
          badge.textContent = idea.tag;
          badge.addEventListener('click', (e) => {
            e.stopPropagation();
            activeFilter = activeFilter === idea.tag ? null : idea.tag;
            render();
          });
          header.appendChild(badge);
        }

        const ts = document.createElement('span');
        ts.className = 'timestamp';
        ts.textContent = relativeTime(idea.createdAt);
        header.appendChild(ts);

        header.addEventListener('click', () => card.classList.toggle('expanded'));

        // --- Expandable body: full text + actions ---
        const body = document.createElement('div');
        body.className = 'idea-body';

        const bodyInner = document.createElement('div');
        bodyInner.className = 'idea-body-inner';

        const text = document.createElement('div');
        text.className = 'idea-text';
        text.textContent = idea.text;
        bodyInner.appendChild(text);

        const actions = document.createElement('div');
        actions.className = 'idea-actions';

        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = 'Copy';
        copyBtn.addEventListener('click', () => copyIdeaText(idea.text, copyBtn));

        const journalBtn = document.createElement('button');
        journalBtn.className = 'notion-btn notion-btn-journal';
        journalBtn.textContent = 'Journal';

        const libraryBtn = document.createElement('button');
        libraryBtn.className = 'notion-btn notion-btn-library';
        libraryBtn.textContent = 'Library';

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '&#x2715;';
        delBtn.title = 'Delete';
        delBtn.addEventListener('click', () => deleteIdea(idea.id));

        const feedback = document.createElement('span');
        feedback.className = 'card-feedback';

        journalBtn.addEventListener('click', () => sendToNotion(idea, DB_JOURNAL, journalBtn, feedback));
        libraryBtn.addEventListener('click', () => sendToNotion(idea, DB_LIBRARY, libraryBtn, feedback));

        actions.appendChild(copyBtn);
        actions.appendChild(journalBtn);
        actions.appendChild(libraryBtn);
        actions.appendChild(delBtn);
        actions.appendChild(feedback);

        bodyInner.appendChild(actions);
        body.appendChild(bodyInner);

        card.appendChild(header);
        card.appendChild(body);
        list.appendChild(card);
      });
    }

    function render() {
      renderFilters();
      renderIdeas();
    }

    // Refresh relative timestamps every minute
    setInterval(render, 60000);

    // Event listeners
    document.getElementById('addBtn').addEventListener('click', () => {
      const text = document.getElementById('ideaInput').value;
      const tag = document.getElementById('tagInput').value;
      addIdea(text, tag);
      document.getElementById('ideaInput').value = '';
      document.getElementById('tagInput').value = '';
      document.getElementById('ideaInput').focus();
    });

    document.getElementById('ideaInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const text = document.getElementById('ideaInput').value;
        const tag = document.getElementById('tagInput').value;
        addIdea(text, tag);
        document.getElementById('ideaInput').value = '';
        document.getElementById('tagInput').value = '';
      }
    });

    document.getElementById('tagInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const text = document.getElementById('ideaInput').value;
        const tag = document.getElementById('tagInput').value;
        addIdea(text, tag);
        document.getElementById('ideaInput').value = '';
        document.getElementById('tagInput').value = '';
        document.getElementById('ideaInput').focus();
      }
    });

    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value.trim().toLowerCase();
      render();
    });

    // Init
    loadIdeas();
    render();
  </script>
</body>
</html>
